# ──────────────────────────────────────────────
# 织物/面料感知质量分析 — 数据分析决策指南
# 基于川端评价系统 (KES) 方法论
#
# 适用场景:
#   汽车座椅面料、内饰面料、服装面料等
#   涉及物理指标与主观感官评分的关联分析
# ──────────────────────────────────────────────

# ══════════════════════════════════════════════
# 第一部分: 场景识别
# ══════════════════════════════════════════════

场景识别:

  - 场景名: 面料质量评估
    触发信号:
      - 数据中包含"拉伸强度" "撕裂强度" "摩擦系数" "压缩回弹率" "断裂伸长率" 等物理指标
      - 数据中包含"柔软度" "手感" "舒适度" "滑爽感" "厚实感" 等主观评分
      - 用户提及"面料" "织物" "皮革" "座椅面料" "内饰材料" "纺织品"
    分析特点:
      - 物理指标与主观感受之间存在非线性映射关系
      - 各物理指标之间有交互效应（如摩擦系数×压缩回弹率共同影响柔软感）
      - 通常样本量不大（20-100 组），需要稳健的统计方法
    核心分析目标:
      - 找出影响主观感受的关键物理指标
      - 建立物理→感官的预测模型
      - 识别异常样本（物理指标好但感官评分低的面料）


# ══════════════════════════════════════════════
# 第二部分: 领域知识 — 常见物理指标
# ══════════════════════════════════════════════

领域知识:
  核心物理指标:
    - {指标: 拉伸强度, 单位: MPa, 含义: "材料断裂前能承受的最大拉应力", 关联感受: "耐久感、结实感", 典型范围: [5, 50]}
    - {指标: 断裂伸长率, 单位: "%", 含义: "断裂时的伸长百分比", 关联感受: "弹性感、延展性", 典型范围: [10, 300]}
    - {指标: 撕裂强度, 单位: N/mm, 含义: "抵抗撕裂的能力", 关联感受: "耐用感、抗破损", 典型范围: [10, 100]}
    - {指标: 摩擦系数, 单位: "无量纲", 含义: "表面摩擦力与正压力比值", 关联感受: "滑爽感、柔软感（负相关）", 典型范围: [0.2, 1.5]}
    - {指标: 压缩回弹率, 单位: "%", 含义: "压缩后恢复原状的能力", 关联感受: "蓬松感、厚实感、弹性", 典型范围: [60, 95]}
    - {指标: 表面粗糙度, 单位: μm, 含义: "表面微观不平度", 关联感受: "细腻感（负相关）", 典型范围: [1, 100]}

  常见主观评分:
    - {指标: 柔软度评分, 类型: "主观评分 1-10", 关联物理指标: [摩擦系数, 压缩回弹率, 断裂伸长率], 关系: "摩擦系数↓+回弹率↑→柔软感↑"}
    - {指标: 厚实感评分, 类型: "主观评分 1-10", 关联物理指标: [压缩回弹率, 撕裂强度], 关系: "回弹率↑+撕裂强度↑→厚实感↑"}
    - {指标: 滑爽感评分, 类型: "主观评分 1-10", 关联物理指标: [摩擦系数, 表面粗糙度], 关系: "摩擦系数↓+粗糙度↓→滑爽感↑"}
    - {指标: 综合舒适度, 类型: "主观评分 1-10", 关联物理指标: [所有指标], 关系: "多指标加权综合"}


# ══════════════════════════════════════════════
# 第三部分: 意图识别与分析方法
# ══════════════════════════════════════════════

意图识别映射:

  - 意图: 物理指标概览
    典型表述:
      - "材料指标数据怎么样" "面料的物理特性" "各指标基本情况"
      - "哪些指标变异大" "物理指标分布"
    推荐步骤:
      - {type: eda, method: describe, params: {}, 理由: "统计摘要一览各指标均值/标准差/范围"}
      - {type: eda, method: distribution, params: {columns: [所有数值物理指标]}, 理由: "直方图检查各指标分布形态，面料指标常呈偏态"}

  - 意图: 物理指标间的关系
    典型表述:
      - "拉伸强度和撕裂强度有关系吗" "哪些指标互相影响"
      - "各物理指标的相关性" "指标之间的关联"
    推荐步骤:
      - {type: eda, method: correlation, params: {corr_method: spearman}, 理由: "面料指标常不满足正态，Spearman 比 Pearson 更稳健"}
      - 可选: {type: eda, method: pairplot, 理由: "散点矩阵看非线性关系和聚类"}

  - 意图: 物理指标与主观感受的关联
    典型表述:
      - "什么指标影响柔软度" "舒适度和哪些物理指标有关"
      - "手感由什么决定" "主观评分的关键影响因子"
    推荐步骤:
      - {type: eda, method: correlation, params: {columns: [主观评分+所有物理指标], corr_method: spearman}, 理由: "Spearman相关筛选与感官相关的物理指标"}
      - {type: eda, method: scatter, params: {x: 关键物理指标, y: 主观评分, trendline: true}, 理由: "散点图看是否存在非线性关系"}
      - {type: model, method: importance, params: {target: 主观评分, model_type: random_forest}, 理由: "RF特征重要性捕获非线性映射关系"}
    为什么这样组合:
      - "面料物理指标→感官的映射通常非线性（如摩擦系数不是越低越好，过低会感觉'滑腻'）"
      - "correlation 看到线性部分，importance 补充非线性部分"

  - 意图: 构建感官预测模型
    典型表述:
      - "用物理指标预测柔软度" "建立手感评价模型"
      - "能否用机器替代人工评分" "感官预测"
    推荐步骤:
      - {type: clean, method: detect_outliers, 理由: "小样本下面料异常值影响大，先检测"}
      - {type: feature, method: scale, params: {scale_method: standard}, 理由: "物理指标量纲差异大(MPa vs 百分比)，必须标准化"}
      - {type: model, method: train, params: {target: 感官评分, model_type: 优先 linear/ridge}, 理由: "小样本(<100)优先简单可解释模型"}
      - {type: model, method: residual, params: {target: 感官评分, model_type: linear}, 理由: "残差诊断发现预测偏差大的样本"}
    模型选择说明:
      - "样本量 < 50: 用 linear/ridge，不要用 RF/XGBoost（会过拟合）"
      - "样本量 50-200: ridge + RF 对比，交叉验证选最优"
      - "样本量 > 200: RF/XGBoost 通常更好"

  - 意图: 异常面料识别
    典型表述:
      - "有没有物理指标好但手感差的面料" "异常样本"
      - "哪些面料表现反常" "不符合规律的样本"
    推荐步骤:
      - {type: model, method: train, params: {target: 感官评分, model_type: linear}, 理由: "先建立基准预测模型"}
      - {type: model, method: residual, params: {target: 感官评分, model_type: linear}, 理由: "残差大的样本=物理指标预测不了感官=异常面料"}
      - {type: eda, method: scatter, params: {x: 预测值, y: 实际值}, 理由: "预测vs实际散点图直观定位异常点"}

  - 意图: 面料对比/分组分析
    典型表述:
      - "A材料和B材料有什么区别" "不同供应商的面料对比"
      - "不同等级的面料差异" "分组比较"
    推荐步骤:
      - {type: eda, method: distribution, params: {columns: [关键指标]}, 理由: "按分组绘制分布图，看组间差异"}
      - {type: eda, method: describe, params: {}, 理由: "分组统计摘要对比"}


# ══════════════════════════════════════════════
# 第四部分: 步骤组合模式
# ══════════════════════════════════════════════

步骤组合模式:

  - 模式名: 面料物理指标体检
    适用场景: 拿到一批新面料物理测试数据
    步骤链:
      - {type: eda, method: describe, 解释: "各指标均值/范围/变异系数"}
      - {type: eda, method: distribution, params: {columns: [全部物理指标]}, 解释: "分布形态检查"}
      - {type: clean, method: detect_outliers, params: {outlier_method: iqr}, 解释: "异常值检测"}

  - 模式名: 手感关键因子分析
    适用场景: 想搞清楚什么物理指标真正影响手感
    步骤链:
      - {type: eda, method: correlation, params: {corr_method: spearman}, 解释: "Spearman比Pearson更适合小样本+非正态"}
      - {type: model, method: importance, params: {model_type: random_forest}, 解释: "非线性重要性补充"}
      - {type: eda, method: scatter, params: {x: "TOP1物理指标", y: "感官评分", trendline: true}, 解释: "最重要的指标单独深看"}

  - 模式名: 感官预测模型
    适用场景: 用物理指标替代人工评分
    步骤链:
      - {type: clean, method: detect_outliers, 解释: "异常值会严重拉偏小样本模型"}
      - {type: feature, method: scale, params: {scale_method: standard}, 解释: "标准化消除量纲差异"}
      - {type: model, method: train, params: {model_type: linear}, 解释: "基础模型，可解释性强"}
      - {type: model, method: residual, 解释: "检查哪些面料的感官评分与物理指标不匹配"}


# ══════════════════════════════════════════════
# 第五部分: 常见陷阱
# ══════════════════════════════════════════════

常见陷阱:
  - "面料分析样本量通常很小（20-80组），不要用深度学习或复杂集成模型"
  - "物理指标量纲差异大（MPa vs 百分比），建模前一定要标准化"
  - "主观评分受评价者个体差异影响大，同一面料不同人打分可能差2-3分"
  - "摩擦系数与柔软度不是简单的线性关系：太低会感觉滑腻，太高会感觉粗糙"
  - "物理指标之间常有共线性（拉伸强度与撕裂强度正相关），需要做特征选择"
  - "不要只依赖相关系数判断重要性——物理指标与感官的关系常常是非线性的"
  - "小样本下交叉验证选 Leave-One-Out 或 5-fold，不要用 10-fold"

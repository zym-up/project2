# ──────────────────────────────────────────────
# 传感器/信号数据分析 — 数据分析决策指南
# 基于 CWRU 轴承故障诊断经典方法论
#
# 适用场景:
#   振动传感器、声学传感器、温度传感器、压力传感器等
#   设备状态监测、故障诊断、预测性维护
# ──────────────────────────────────────────────

# ══════════════════════════════════════════════
# 第一部分: 场景识别
# ══════════════════════════════════════════════

场景识别:

  - 场景名: 传感器信号分析 / 设备故障诊断
    触发信号:
      - 数据是时间序列（时间戳连续，采样频率固定）
      - 列名包含"时间" "timestamp" "振动" "加速度" "转速" "温度" "电流" "声压"
      - 用户提及"传感器" "振动" "故障" "监测" "信号" "频谱" "时域" "频域"
      - 数据有明确的标签列（如 normal / fault_type / condition）
      - 单列数据行数很大（>1000行），是连续采样信号
    分析特点:
      - 原始信号通常不能直接建模，需要先提取特征
      - 分析分为两个阶段：特征提取 → 常规数据分析
      - 特征提取后数据变成行少列多的形态（每段信号 → 一行特征向量）
      - 频域特征和时域特征互补，两者结合效果最好
    核心分析目标:
      - 从原始信号中提取有区分力的特征
      - 用特征进行故障模式分类
      - 找出对故障最敏感的频段/指标

  - 场景名: 通用时间序列分析
    触发信号:
      - 数据是时间序列但非传感器（如销量、价格、温度变化）
      - 用户提及"趋势" "周期" "季节性" "随时间变化"
    分析特点:
      - 侧重趋势分析和周期性发现，不是故障分类
      - 需要用到折线图、滚动统计等方法
    # 此场景当前方法基本覆盖，主要用 eda.line


# ══════════════════════════════════════════════
# 第二部分: 领域知识 — 信号特征
# ══════════════════════════════════════════════

领域知识:
  时域特征 (从原始信号直接计算):
    - {特征: 均值 (mean), 含义: "信号的直流分量/中心趋势", 用途: "不同故障类型的振动中心可能偏移"}
    - {特征: 标准差 (std), 含义: "信号的波动幅度", 用途: "故障通常导致振动幅度增大"}
    - {特征: 峰度 (kurtosis), 含义: "信号中冲击成分的多少", 用途: "轴承点蚀等局部故障会产生冲击→峰度升高"}
    - {特征: 偏度 (skewness), 含义: "信号分布的不对称性", 用途: "磨损类故障常导致分布偏斜"}
    - {特征: RMS (均方根), 含义: "信号的有效能量", 用途: "故障严重程度的核心指标，RMS↑→故障加剧"}
    - {特征: 峰峰值 (peak_to_peak), 含义: "最大值-最小值", 用途: "冲击型故障的敏感指标"}
    - {特征: 波形因子 (crest_factor), 含义: "峰值/RMS", 用途: "早期故障检测，CF↑→早期损伤信号"}

  频域特征 (需FFT变换):
    - {特征: 主频幅值, 含义: "频谱中能量最大的频率分量的振幅", 用途: "不同故障对应不同特征频率"}
    - {特征: 频谱重心, 含义: "频谱能量分布的中心频率", 用途: "故障发展过程中频谱重心会漂移"}
    - {特征: 频带能量, 含义: "特定频率区间的能量总和", 用途: "轴承故障频率集中在特定频带(如BPFO/BPFI)"}
    - {特征: 频谱峰度, 含义: "频谱的平坦度", 用途: "宽带噪声 vs 窄带特征信号"}

  故障类型 (以轴承为例):
    - {故障: 正常 (Normal), 特征表现: "振动幅值低，频谱均匀，无明显冲击"}
    - {故障: 内圈故障 (Inner Race), 特征表现: "BPFI频率处能量高，冲击脉冲明显"}
    - {故障: 外圈故障 (Outer Race), 特征表现: "BPFO频率处能量高，频谱中低频带突出"}
    - {故障: 滚动体故障 (Ball), 特征表现: "BSF频率处能量高，信号最不规则"}
    - {故障: 复合故障, 特征表现: "多个特征频率同时出现"}

  分析流程范式:
    - "原始信号 → 滑动窗口分段 → 每段提取时域+频域特征 → 特征向量表 → 标准化 → 分类/聚类 → 评估"


# ══════════════════════════════════════════════
# 第三部分: 意图识别与分析方法
# ══════════════════════════════════════════════

意图识别映射:

  # ── 信号概览类 ──
  - 意图: 查看原始信号形态
    典型表述:
      - "看看振动信号长什么样" "原始波形"
      - "传感器数据曲线" "时序图"
      - "信号有没有异常波动"
    推荐步骤:
      - {type: eda, method: line, params: {x: 时间列, y: 信号列}, 理由: "折线图是最直观的时序信号展示方式"}
      - 可选: {type: eda, method: distribution, params: {columns: [信号列]}, 理由: "直方图看信号幅值分布，正常情况下应接近正态"}
      - 可选: {type: eda, method: describe, 理由: "统计摘要看信号的均值/标准差/极值"}
    注意:
      - "如果数据行数很大(>10万)，先对信号降采样再绘图，否则前端会卡"
      - "多通道传感器可以分别绘制各通道的折线图"

  - 意图: 信号分组对比
    典型表述:
      - "正常和故障信号有什么区别" "对比不同状态下的波形"
      - "各故障类型的振动特征" "分组比较"
    推荐步骤:
      - {type: eda, method: line, params: {x: 时间, y: 信号, group_by: 故障类型}, 理由: "不同故障类型的时序波形叠加对比"}
      - {type: eda, method: distribution, params: {columns: [信号幅值]}, 理由: "不同故障下幅值分布的差异"}
      - {type: eda, method: describe, 理由: "分组统计摘要(均值/方差/峰度等)"}

  # ── 特征提取类（需要新方法支持） ──
  - 意图: 提取信号特征
    典型表述:
      - "从振动信号中提取特征" "计算时域特征"
      - "提取频域特征" "做FFT" "频谱分析"
      - "把原始信号转化为特征表"
    分析说明: "此功能需要新增 engine 方法支持。当前可告知用户正在开发中。"
    待实现方法:
      - type: feature, method: extract_time_domain
        params: {columns, features: [mean,std,rms,kurtosis,skewness,peak_to_peak,crest_factor]}
        描述: 从原始信号列提取时域特征
      - type: feature, method: extract_frequency_domain
        params: {columns, sampling_rate, features: [dominant_freq,spectral_centroid,band_energy]}
        描述: 对信号做FFT，提取频域特征
      - type: feature, method: sliding_window
        params: {column, window_size, overlap}
        描述: 滑动窗口将长信号切分为多段，为后续特征提取做准备

  # ── 故障分类类 ──
  - 意图: 故障诊断/模式识别
    典型表述:
      - "识别故障类型" "故障分类" "判断是什么故障"
      - "自动诊断" "故障检测" "异常检测"
      - "训练故障诊断模型"
    前置条件: "需要先完成特征提取（原始信号→特征向量），当前引擎需新增特征提取方法"
    推荐步骤（特征提取完成后）:
      - {type: feature, method: scale, params: {scale_method: standard}, 理由: "时域和频域特征量纲差异大，标准化后建模"}
      - {type: feature, method: correlation_select, params: {target: 故障标签, k: 10}, 理由: "从几十个特征中选出对故障最敏感的特征"}
      - {type: model, method: train, params: {target: 故障标签, model_type: random_forest}, 理由: "RF对传感器特征分类效果好，且能输出特征重要性"}
      - {type: model, method: importance, params: {target: 故障标签, model_type: random_forest}, 理由: "看哪些特征(时域/频域)对故障识别贡献最大"}

  # ── 寻找敏感特征类 ──
  - 意图: 找到对故障最敏感的指标
    典型表述:
      - "什么特征最能区分故障" "哪个频段最敏感"
      - "故障特征重要性排序" "关键指标"
    前置条件: "需要特征表（已从原始信号提取特征）"
    推荐步骤:
      - {type: eda, method: correlation, params: {corr_method: pearson}, 理由: "各特征与故障标签的线性相关"}
      - {type: model, method: importance, params: {target: 故障标签, model_type: random_forest}, 理由: "从分类模型角度看特征贡献"}

  # ── 评估诊断效果类 ──
  - 意图: 评估故障诊断模型效果
    典型表述:
      - "模型准确率怎么样" "哪些故障容易误判"
      - "效果评估" "分类报告" "混淆矩阵"
    分析说明: "模型 train 方法已返回 R²/MSE 等指标。混淆矩阵可视化需要新增图表方法。"
    待实现方法:
      - type: model, method: confusion_matrix
        params: {target, model_type}
        描述: 绘制多分类混淆矩阵热力图，直观展示各类故障的识别准确率和误判模式


# ══════════════════════════════════════════════
# 第四部分: 步骤组合模式
# ══════════════════════════════════════════════

步骤组合模式:

  - 模式名: 传感器数据初探
    适用场景: 拿到传感器采集数据，想先看看信号的特征
    步骤链:
      - {type: eda, method: line, params: {x: 时间, y: 信号列}, 解释: "观察时序波形"}
      - {type: eda, method: distribution, params: {columns: [信号列]}, 解释: "观察信号幅值分布"}
      - {type: eda, method: describe, 解释: "统计摘要看均值/方差/极值"}
    注意: "数据量过大时先降采样"

  - 模式名: 故障模式对比分析
    适用场景: 已知故障标签，想看不同故障的信号差异
    步骤链:
      - {type: eda, method: line, params: {group_by: 故障类型}, 解释: "叠加对比不同故障的波形"}
      - {type: eda, method: distribution, params: {columns: [信号幅值]}, 解释: "不同故障的幅值分布差异"}
    预期发现: "外圈故障振幅最大，滚动体故障波形最不规则"

  - 模式名: 端到端故障诊断（待特征提取方法实现后完整）
    适用场景: 从原始信号到故障分类模型的完整流程
    步骤链:
      - {type: clean, method: detect_outliers, 解释: "去除传感器异常跳点（电磁干扰/接触不良）"}
      - @待实现: {type: feature, method: extract_time_domain, 解释: "从每段信号提取均值/方差/峰度/RMS等"}
      - @待实现: {type: feature, method: extract_frequency_domain, 解释: "FFT提取频域特征"}
      - {type: feature, method: scale, params: {scale_method: standard}, 解释: "标准化各特征"}
      - {type: feature, method: correlation_select, params: {target: 故障标签, k: 15}, 解释: "筛选最敏感特征"}
      - {type: model, method: train, params: {target: 故障标签, model_type: random_forest}, 解释: "RF分类"}
      - {type: model, method: importance, 解释: "特征重要性—哪些指标/频段最关键"}
      - @待实现: {type: model, method: confusion_matrix, 解释: "混淆矩阵—哪类故障容易误判"}


# ══════════════════════════════════════════════
# 第五部分: 常见陷阱
# ══════════════════════════════════════════════

常见陷阱:
  - "不要把原始信号直接丢给模型！必须先将长信号切段+提取特征，否则维度灾难"
  - "FFT之前确保采样频率正确，错误的采样频率会导致特征频率偏移"
  - "滑动窗口大小影响特征质量：太大→样本少，太小→特征不稳定。窗口至少包含10个周期"
  - "训练集和测试集不要来自同一段连续信号（会导致数据泄漏，准确率虚高）"
  - "传感器数据常有电磁干扰导致的异常跳点（尖峰），需要先检测并处理"
  - "不同故障类型的样本数通常不平衡（正常样本>>故障样本），需注意类别平衡问题"
  - "频域特征和时域特征互补：只用时域会漏掉频率信息，只用频域会漏掉能量信息"
  - "振动传感器的安装位置/方向会影响信号，不同传感器之间不能直接比较绝对值"
  - "转速变化时（变速工况），需要先做阶次跟踪或重采样，FFT不能直接用"

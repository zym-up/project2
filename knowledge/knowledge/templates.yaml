座椅面料感知质量:
  description: 分析面料物理性质与用户主观感受之间的关联
  steps:
    - 数据清洗与缺失值处理
    - 各指标描述性统计
    - 物理指标与主观评分相关性分析
    - 多元线性回归建模
    - 残差诊断与异常样本识别
    - 特征重要性排序
  notes: 注意区分客观物理指标和主观评分字段，相关性分析时两种方法都尝试

用户群体满意度分析:
  description: 挖掘不同用户群体对汽车内饰满意度的潜在规律
  steps:
    - 数据清洗与编码
    - 用户群体分层描述统计
    - 各维度满意度分布可视化
    - 分组差异显著性检验
    - 聚类分析识别用户群体
  notes: 关注年龄、性别、车型等分层变量，聚类前需标准化处理
